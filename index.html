<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%23c96a15'/%3E%3Cg stroke='%23faf8f4' stroke-width='2.6' stroke-linecap='round'%3E%3Cpath d='M7 13v6'/%3E%3Cpath d='M12 9v14'/%3E%3Cpath d='M17 6v20'/%3E%3Cpath d='M22 11v10'/%3E%3Cpath d='M27 14v4'/%3E%3C/g%3E%3C/svg%3E"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Audiotrail turns your Audible data takeout into a private dashboard — parsed entirely in your browser. No uploads, no servers, no tracking."
    />
    <title>Audiotrail — your Audible history, visualized locally</title>
    <script>
      try {
        var stored = localStorage.getItem('audiotrail:dark')
        if (
          stored === '1' ||
          (stored === null && window.matchMedia('(prefers-color-scheme: dark)').matches)
        ) {
          document.documentElement.classList.add('dark')
        }
      } catch (e) {
        /* private mode — default to light */
      }
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
