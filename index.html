<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Audiotrail turns your Audible data takeout into a private dashboard — parsed entirely in your browser. No uploads, no servers, no tracking."
    />
    <title>Audiotrail — your Audible history, visualized locally</title>
    <script>
      try {
        var stored = localStorage.getItem("audiotrail:dark");
        if (stored === "1" || (stored === null && window.matchMedia("(prefers-color-scheme: dark)").matches)) {
          document.documentElement.classList.add("dark");
        }
      } catch (e) {
        /* private mode — default to light */
      }
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
